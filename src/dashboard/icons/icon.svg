  <rect x="264" y="254" width="24" height="8" fill="#00d9ff" rx="4" opacity="0.6"/>
  <!-- Grips -->
  <ellipse cx="160" cy="340" rx="48" ry="32" fill="#0a0a0a" stroke="#00d9ff" stroke-width="8"/>
  <ellipse cx="352" cy="340" rx="48" ry="32" fill="#0a0a0a" stroke="#00d9ff" stroke-width="8"/>
