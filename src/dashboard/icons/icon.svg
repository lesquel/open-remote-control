  <circle cx="330" cy="238" r="14" fill="#00d9ff" opacity="0.7"/>
  <circle cx="362" cy="258" r="14" fill="#00d9ff" opacity="0.7"/>
  <circle cx="330" cy="278" r="14" fill="#00d9ff" opacity="0.7"/>
  <circle cx="298" cy="258" r="14" fill="#00d9ff" opacity="0.7"/>
  <!-- Start/Select buttons -->
